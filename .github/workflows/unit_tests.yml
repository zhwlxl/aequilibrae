name: Tests on all platforms with linting

on: [pull_request]

env:
  AEQ_SHOW_PROGRESS: "0"

jobs:
  linting:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - name: Set Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/ruff-action@v3
        with:
          version: 0.14.8
          args: check --output-format=github

  testing:
    needs: linting
    runs-on: ${{ matrix.os}}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}-${{ matrix.python-version }}
      cancel-in-progress: true
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        os: [windows-latest, ubuntu-latest, macos-latest]
        exclude:
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.11'
          - os: macos-latest
            python-version: '3.12'

      max-parallel: 20
    steps:
    - uses: actions/checkout@v6
    - name: Set Python environment
      uses: astral-sh/setup-uv@v7
      with:
          python-version: ${{ matrix.python-version }}

    - name: Download llvm and spatialite tools on macOS
      if: matrix.os == 'macos-latest'
      run: |
        brew install llvm libspatialite

    - name: Download spatialite on Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt update
        sudo apt install -y libspatialite-dev libsqlite3-mod-spatialite
        sudo ln -s /usr/lib/x86_64-linux-gnu/mod_spatialite.so /usr/lib/x86_64-linux-gnu/mod_spatialite

    - name: Download spatialite on Windows
      if: matrix.os == 'windows-latest'
      run: |
        uv run tests/setup_windows_spatialite.py

    - name: Install Python and create virtual environment
      run: uv venv .venv --python ${{ matrix.python-version }} --python-preference only-managed  --clear

    - name: Install dependencies (Windows & Linux)
      if: matrix.os != 'macos-latest'
      run: uv pip install -e ".[dev]"

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: uv pip install -e ".[dev]"
      env:
        CXX: /opt/homebrew/opt/llvm/bin/clang++
        CC: /opt/homebrew/opt/llvm/bin/clang

    - name: Runs test (Windows & Linux)
      if: matrix.os != 'macos-latest'
      run: uv run pytest tests/ --durations=50 --dist=loadscope -n 4 --random-order --verbose

    - name: Runs test (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        uv pip uninstall pytest-xdist
        DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:/opt/homebrew/lib uv run pytest tests/ --durations=50 --random-order --verbose
