name: Build

on:
 push:
    branches:
      - 'develop'
 pull_request:
 release:
     types: [published]


jobs:
  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Build SDist
        run: pipx run build --sdist

#      - name: Test if SDist build has all necessary pieces to be installed
#        run: |
#          pip3 install setuptools build --upgrade
#          pip3 install dist/*.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm] # macos-latest, macos-13

    steps:
      - uses: actions/checkout@v6

      - name: Pre-download virtualenv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cacheDir = "$env:LOCALAPPDATA\pypa\cibuildwheel\Cache"
          New-Item -ItemType Directory -Force -Path $cacheDir
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/pypa/get-virtualenv/20.30.0/public/virtualenv.pyz" -OutFile "$cacheDir\virtualenv-20.30.0.pyz"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_all:
    needs: [build_wheels, make_sdist]
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-*
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
